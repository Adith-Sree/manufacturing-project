<!DOCTYPE html>
<html>

<head>
<title>CNC Machining Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

<h1>CNC Machining Calculator</h1>

<div class="grid">

<!-- MATERIAL -->

<div class="card">

<h3>Material</h3>

<select id="material">
<option value="steel">Mild Steel</option>
<option value="aluminium">Aluminium</option>
<option value="castiron">Cast Iron</option>
<option value="stainless">Stainless Steel</option>
</select>

<p id="recommended_speed"></p>

</div>


<!-- TOOL PARAMETERS -->

<div class="card">

<h3>Tool Parameters</h3>

<label>Tool Nose Radius (mm)</label>
<input id="nose_radius" type="number">

<label>Tool Diameter (mm)</label>
<input id="diameter" type="number">

<label>Depth of Cut (mm)</label>
<input id="doc" type="number">

<label>Feed (mm/rev)</label>
<input id="feed" type="number">

</div>


<!-- MACHINE PARAMETERS -->

<div class="card">

<h3>Machine Parameters</h3>

<label>RPM</label>
<input id="rpm" type="number">

<label>Machining Length (mm)</label>
<input id="length" type="number">

<label>Machining Allowance (mm)</label>
<input id="allowance" type="number">

</div>

</div>


<button onclick="calculate()">Run Calculation</button>


<!-- RESULTS -->

<div class="results">

<h2>Results</h2>

<p id="cutting_speed"></p>
<p id="feed_rate"></p>
<p id="machining_time"></p>
<p id="mrr"></p>
<p id="power"></p>
<p id="surface_finish"></p>

</div>


<!-- G CODE -->

<div class="results">

<h3>Generated G-Code</h3>

<pre id="gcode"></pre>

</div>


<!-- CHART -->

<canvas id="rpmChart"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
